name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Build
        run: cargo build --release

      - name: Package ZIP
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $pkg = "audio-input"
          New-Item -ItemType Directory -Force -Path $pkg | Out-Null

          Copy-Item target/release/audio-input.exe $pkg/
          Copy-Item assets/hotwords.yaml $pkg/
          Copy-Item settings.example.json $pkg/

          # INSTALL.txt with model & config instructions
          Set-Content -Path $pkg/INSTALL.txt -Encoding utf8 @'
          Model download:
            https://github.com/k2-fsa/sherpa-onnx/releases/download/asr-models/sherpa-onnx-sense-voice-zh-en-ja-ko-yue-int8-2025-09-09.tar.bz2
            Extract to models/sense-voice-int8/ (beside audio-input.exe)

          LLM config:
            Copy settings.example.json to settings.json and edit.
          '@

          $zip = "audio-input-${{ github.ref_name }}-win-x64.zip"
          Compress-Archive -Path $pkg -DestinationPath $zip
          Write-Host "Created $zip"

      - name: Upload to Release
        shell: pwsh
        run: |
          $zip = Get-ChildItem audio-input-*.zip | Select-Object -First 1
          gh release delete v0.3.0 --yes --cleanup-tag 2>$null
          gh release create ${{ github.ref_name }} $zip --title "${{ github.ref_name }}" --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
