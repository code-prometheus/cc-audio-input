name: CI

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]

permissions:
  contents: write
  actions: read

env:
  CARGO_TERM_COLOR: always

jobs:
  build-and-test:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4

    - uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: ${{ runner.os }}-cargo-

    - name: Build
      run: cargo build --release

    - name: Test
      run: cargo test --release

    - name: Package
      shell: pwsh
      run: |
        $pkg = "audio-input"
        New-Item -ItemType Directory -Force -Path $pkg | Out-Null
        Copy-Item target/release/audio-input.exe $pkg/
        Copy-Item hotwords.yaml $pkg/
        Copy-Item models.yaml $pkg/
        Copy-Item settings.example.json $pkg/
        Copy-Item assets/tray_icon.ico $pkg/
        # Sherpa-ONNX CLI binaries
        New-Item -ItemType Directory -Force -Path $pkg/sherpa_dll/sherpa-onnx-v1.13.3-win-x64-shared-MD-Release/bin | Out-Null
        Copy-Item sherpa_dll/sherpa-onnx-v1.13.3-win-x64-shared-MD-Release/bin/sherpa-onnx-offline.exe $pkg/sherpa_dll/sherpa-onnx-v1.13.3-win-x64-shared-MD-Release/bin/
        Copy-Item sherpa_dll/sherpa-onnx-asr-x64.exe $pkg/sherpa_dll/
        # INSTALL.txt
        Set-Content -Path $pkg/INSTALL.txt -Encoding utf8 @'
Model download:
  https://github.com/k2-fsa/sherpa-onnx/releases/download/asr-models/sherpa-onnx-sense-voice-zh-en-ja-ko-yue-int8-2025-09-09.tar.bz2
  Extract to models/sense-voice-int8/ (beside audio-input.exe)

LLM config:
  Copy settings.example.json to settings.json and edit your API endpoint.
'@
        Compress-Archive -Path $pkg/* -DestinationPath audio-input-windows-x64.zip
        Write-Host "Created audio-input-windows-x64.zip"

    - uses: actions/upload-artifact@v4
      with:
        name: audio-input-windows-x64
        path: audio-input-windows-x64.zip

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-and-test
    runs-on: windows-latest
    steps:
    - uses: actions/download-artifact@v4
      with:
        name: audio-input-windows-x64

    - name: Create GitHub Release
      shell: bash
      run: |
        gh release create "${{ github.ref_name }}" audio-input-windows-x64.zip \
          --title "audio-input ${{ github.ref_name }}" \
          --generate-notes \
          --repo "${{ github.repository }}"
      env:
        GH_TOKEN: ${{ github.token }}
