name: CI

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]

permissions:
  contents: write
  actions: read

env:
  CARGO_TERM_COLOR: always

jobs:
  build-and-test:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4

    - uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: ${{ runner.os }}-cargo-

    - name: Build
      run: cargo build --release

    - name: Test
      run: cargo test --release

    - name: Package
      shell: pwsh
      run: |
        $ErrorActionPreference = 'Stop'
        $pkg = "audio-input"
        New-Item -ItemType Directory -Force -Path $pkg | Out-Null

        Copy-Item target/release/audio-input.exe $pkg/
        Copy-Item hotwords.yaml $pkg/
        Copy-Item models.yaml $pkg/
        Copy-Item settings.example.json $pkg/
        Copy-Item assets/tray_icon.ico $pkg/
        Copy-Item assets/hotwords.yaml $pkg/
        Copy-Item assets/sherpa-onnx-offline.exe $pkg/
        Copy-Item assets/onnxruntime.dll $pkg/
        Copy-Item assets/onnxruntime_providers_shared.dll $pkg/

        Set-Content -Path "$pkg/INSTALL.txt" -Encoding utf8 -Value "Model download:`n  https://github.com/k2-fsa/sherpa-onnx/releases/download/asr-models/sherpa-onnx-sense-voice-zh-en-ja-ko-yue-int8-2025-09-09.tar.bz2`n  Extract to models/sense-voice-int8/ (beside audio-input.exe)`n`nLLM config:`n  Copy settings.example.json to settings.json and edit."

        $zip = "audio-input-${{ github.ref_name }}-win-x64.zip"
        Compress-Archive -Path $pkg -DestinationPath $zip
        Write-Host "Created $zip"

    - uses: actions/upload-artifact@v4
      with:
        name: audio-input-windows-x64
        path: audio-input-*-win-x64.zip

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-and-test
    runs-on: windows-latest
    steps:
    - uses: actions/download-artifact@v4
      with:
        name: audio-input-windows-x64

    - name: Create GitHub Release
      shell: bash
      run: |
        ZIP=$(ls audio-input-*-win-x64.zip | head -1)
        gh release create "${{ github.ref_name }}" "$ZIP" \
          --title "audio-input ${{ github.ref_name }}" \
          --generate-notes \
          --repo "${{ github.repository }}"
      env:
        GH_TOKEN: ${{ github.token }}
